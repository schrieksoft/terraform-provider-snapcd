name: Tests

on:
  pull_request:
    paths-ignore:
      - "README.md"
  push:
    branches:
      - 'feature/**'

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: "go.mod"
          cache: true
      - run: go mod download
      - run: go build -v .
      - run: go vet ./...
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  test:
    name: Acceptance Tests
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: "go.mod"
          cache: true
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Start SnapCD stack
        run: docker compose -f .github/ci/docker-compose.yml up -d

      - name: Wait for SnapCD server
        run: |
          echo "Waiting for SnapCD server to become healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Server is healthy"
              exit 0
            fi
            echo "Attempt $i/60 - server not ready yet"
            sleep 5
          done
          echo "Server failed to become healthy"
          docker compose -f .github/ci/docker-compose.yml logs snapcd-server
          exit 1

      - name: Activate license
        env:
          SNAPCD_LICENSE_KEY: ${{ secrets.SNAPCD_IO_LICENSE_KEY }}
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:8080/connect/token \
            -d "grant_type=client_credentials&client_id=debugTerraformer&client_secret=debugTerraformer&scope=snapcd_scope" \
            | jq -r '.access_token')
          curl -sf -X POST "http://localhost:8080/api/10000000-0000-0000-0000-000000000000/License/activate" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"licenseKey\": \"$SNAPCD_LICENSE_KEY\"}"

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          SNAPCD_URL: "http://localhost:8080"
          SNAPCD_INSECURE_SKIP_VERIFY: "false"
        run: go test -v -cover -timeout 10m ./internal/tests/...

      - name: Dump server logs on failure
        if: failure()
        run: docker compose -f .github/ci/docker-compose.yml logs snapcd-server

      - name: Teardown
        if: always()
        run: docker compose -f .github/ci/docker-compose.yml down -v
